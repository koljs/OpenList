name: Sync to Gitee

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    name: Sync GitHub to Gitee
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GITEE_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan gitee.com >> ~/.ssh/known_hosts

      - name: Create single commit and push
        env:
          GITEE_REPO_URL: ${{ vars.GITEE_REPO_URL }}
          GITEE_SSH_PRIVATE_KEY: ${{ secrets.GITEE_SSH_PRIVATE_KEY }}
        run: |
          # 未配置 Gitee 凭据时优雅跳过，避免崩溃
          if [ -z "$GITEE_REPO_URL" ] || [ -z "$GITEE_SSH_PRIVATE_KEY" ]; then
            echo "::warning::GITEE_REPO_URL 或 GITEE_SSH_PRIVATE_KEY 未配置，跳过 Gitee 同步。"
            echo "请在仓库 Settings → Secrets and variables → Actions 中配置："
            echo "  - Secret: GITEE_SSH_PRIVATE_KEY (Gitee SSH 私钥)"
            echo "  - Variable: GITEE_REPO_URL (如 git@gitee.com:koljs/OpenList.git)"
            exit 0
          fi

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # Create a new branch
          git checkout --orphan new-main
          git add .
          git commit -m "Sync from GitHub: $(date)"

          # Add Gitee remote and force push
          git remote add gitee "$GITEE_REPO_URL"
          git push --force gitee new-main:main
