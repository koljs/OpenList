name: Build Magisk Module

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v4.2.2)'
        required: true
        default: 'v4.2.2'
        type: string
  push:
    branches: ["main"]
    paths:
      - 'drivers/guangya/**'
      - '.github/workflows/magisk.yml'

permissions:
  contents: write

jobs:
  build-magisk:
    name: Build Magisk Module for Android ARM64
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'

      - name: Setup NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26b-linux.zip
          unzip -q android-ndk-r26b-linux.zip
          rm android-ndk-r26b-linux.zip

      - name: Setup web
        run: bash build.sh dev web
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FRONTEND_REPO: ${{ vars.FRONTEND_REPO }}

      - name: Build Android ARM64
        run: |
          VERSION="${{ github.event.inputs.version || 'v4.2.2' }}"
          BUILT_AT="$(date +'%F %T %z')"
          GIT_COMMIT=$(git log --pretty=format:"%h" -1)
          
          export GOOS=android
          export GOARCH=arm64
          export CGO_ENABLED=1
          export CC="$(pwd)/android-ndk-r26b/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang"
          
          LDFLAGS="-w -s \
            -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.BuiltAt=$BUILT_AT' \
            -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.GitAuthor=The OpenList Projects Contributors <noreply@openlist.team>' \
            -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.GitCommit=$GIT_COMMIT' \
            -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.Version=$VERSION' \
            -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.WebVersion=rolling'"
          
          go build -o openlist -ldflags="$LDFLAGS" -tags=jsoniter .
          
          # Strip binary
          android-ndk-r26b/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip openlist
          
          echo "Binary size: $(ls -lh openlist)"

      - name: Create Magisk Module
        run: |
          VERSION="${{ github.event.inputs.version || 'v4.2.2' }}"
          VERSION_CODE=$(echo "$VERSION" | sed 's/v//' | sed 's/\./' | sed 's/$/00/')
          
          mkdir -p magisk_module/system/bin
          
          # Create module.prop
          cat > magisk_module/module.prop << EOF
          id=openlist_arm64_guangya
          name=OpenList ARM64 with GuangYa Cloud Drive
          version=$VERSION
          versionCode=$VERSION_CODE
          author=OpenListTeam
          description=OpenList binary for ARM64 Android devices, includes GuangYa (光鸭云盘) driver support
          EOF
          
          # Create post-fs-data.sh
          cat > magisk_module/post-fs-data.sh << 'SCRIPT'
          #!/system/bin/sh
          MODDIR=${0%/*}
          chmod 755 "$MODDIR/system/bin/openlist"
          chown root:root "$MODDIR/system/bin/openlist"
          SCRIPT
          
          # Create service.sh
          cat > magisk_module/service.sh << 'SCRIPT'
          #!/system/bin/sh
          MODDIR=${0%/*}
          while [ "$(getprop sys.boot_completed)" != "1" ]; do
              sleep 1
          done
          chmod 755 "$MODDIR/system/bin/openlist"
          chown root:root "$MODDIR/system/bin/openlist"
          nohup "$MODDIR/system/bin/openlist" server --no-prefix > /data/local/tmp/openlist.log 2>&1 &
          SCRIPT
          
          # Copy binary
          cp openlist magisk_module/system/bin/openlist
          
          # Create zip
          cd magisk_module
          zip -r ../openlist-arm64-guangya-magisk-$VERSION.zip *
          cd ..
          
          echo "Magisk module created: openlist-arm64-guangya-magisk-$VERSION.zip"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: magisk-module
          path: openlist-arm64-guangya-magisk-*.zip
          compression-level: 0

      - name: Upload to Release (if beta)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: openlist-arm64-guangya-magisk-*.zip
          prerelease: true
          tag_name: beta